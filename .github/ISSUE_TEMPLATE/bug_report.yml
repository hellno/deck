name: Bug report
description: Something in the Deck starter doesn't work as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Deck is a starter — if the issue is in your
        own app code after forking, this tracker probably can't help. For
        security issues, do **not** file here; see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps. A small diff or snippet helps a lot.
      placeholder: |
        1. `cargo run --features overlay`
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (X11)
        - Linux (Wayland)
        - Other (note in description)
    validations:
      required: true
  - type: dropdown
    id: features
    attributes:
      label: Feature flags
      description: Which build were you running?
      options:
        - default
        - tray
        - overlay
        - tray,overlay
    validations:
      required: true
  - type: input
    id: gpui-commit
    attributes:
      label: GPUI commit
      description: The `gpui` commit from Cargo.lock (`grep -A2 'name = "gpui"' Cargo.lock`).
      placeholder: "86effffd..."
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / backtrace
      description: Any terminal output or `RUST_BACKTRACE=1` trace.
      render: shell
    validations:
      required: false
